<style>
  :root {

    --text:      #e0e0e0;
    --muted:     #888;
    --h1-color:  #7eb8e8;
    --h2-color:  #a8d0f0;
    --ach-color: #6fbf8e;
    --warn-color:#e8b84a;
    --note-color:#999;
    --done-text: #555;
    --check-border: #666;
    --check-checked: #5a9e6f;
    --ext-color: #777;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; line-height: 1.5; }
  #site-header { background: #111; border-bottom: 1px solid var(--border); padding: 14px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; overflow: hidden; height: 54px; }
  #site-header h1 { font-size: 18px; font-weight: 700; color: var(--h1-color); letter-spacing: 0.03em; }
  #site-header h1 a { color: inherit; text-decoration: none; }
  #site-header h1 a:hover { text-decoration: underline; }
  .header-controls { display: flex; gap: 10px; align-items: center; margin-left: auto; }
  .btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; transition: background 0.15s; }
  .btn:hover { background: #3a3a3a; }
  .progress-wrap { font-size: 12px; color: var(--muted); white-space: nowrap; }
  #toc { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; gap: 6px; flex-wrap: wrap; position: sticky; top: 54px; z-index: 99; }
  #toc a { color: var(--h1-color); text-decoration: none; font-size: 13px; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--border); transition: background 0.15s; }
  #toc a:hover { background: var(--bg3); }
  #toc-kofi { margin-left: auto; }
  #content { max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }
  .range-header { font-size: 14px; font-weight: 700; color: var(--h2-color); margin: 24px 0 6px; padding: 4px 10px; }
  .check-item { display: flex; align-items: flex-start; gap: 8px; padding: 3px 4px 3px 6px; border-radius: 3px; margin: 2px 0; cursor: pointer; transition: background 0.1s, border-left-color 0.15s; border-left: 2px solid transparent; }
  .check-item:hover { background: var(--bg2); border-left-color: var(--h1-color); }
  .check-item.done { border-left-color: var(--check-checked); }
  .check-item.missable { border-left: 2px solid var(--warn-color); }
  .check-item.missable.done { border-left-color: var(--check-checked); }
  .check-item input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 15px; height: 15px; min-width: 15px; border: 1.5px solid var(--check-border); border-radius: 3px; background: transparent; cursor: pointer; margin-top: 2px; transition: background 0.2s, border-color 0.2s, transform 0.15s; position: relative; }
  .check-item input[type="checkbox"]:checked { background: var(--check-checked); border-color: var(--check-checked); transform: scale(1.15); }
  .check-item input[type="checkbox"]:checked::after { content: ''; position: absolute; left: 3px; top: 0px; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg); }
  .check-item label { cursor: pointer; flex: 1; line-height: 1.45; font-size: 13.5px; transition: color 0.2s; }
  .check-item.done label { color: var(--done-text); text-decoration: line-through; }
  body.hide-done .check-item.done { display: none; }
  .entry-num { color: var(--muted); font-size: 13px; display: inline-block; margin-right: 6px; }
  .entry-loc { display: block; margin-top: 4px; }
  .entry-loc span { display: inline-block; background: #1a1a2e; border: 1px solid #3a3a5a; border-radius: 20px; padding: 1px 8px; font-size: 11px; color: #a0b8d0; margin: 2px 2px 0 0; }
  .entry-warn { color: var(--warn-color); font-size: 11.5px; display: block; margin-top: 1px; font-style: italic; }
  .entry-note { color: var(--note-color); font-size: 11.5px; display: block; margin-top: 1px; font-style: italic; }
  #scroll-top { position: fixed; bottom: 20px; right: 20px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
  #scroll-top:hover { opacity: 1 !important; }
</style>

<button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
(function(){
  const STORE = 'ff4-advance-bestiary';
  const boxes = Array.from(document.querySelectorAll('.check-item input[type="checkbox"]'));
  const total = boxes.length;

  function save(){
    const state = {};
    boxes.forEach(b => { if(b.checked) state[b.id] = 1; });
    localStorage.setItem(STORE, JSON.stringify(state));
  }

  function load(){
    try { return JSON.parse(localStorage.getItem(STORE)) || {}; } catch(e){ return {}; }
  }

  function updateProgress(){
    const done = boxes.filter(b => b.checked).length;
    document.getElementById('progress-display').textContent = done + ' / ' + total + ' completed';
    document.getElementById('progress-bar-fill').style.width = (total ? (done/total*100) : 0) + '%';
    try {
      const meta = JSON.parse(localStorage.getItem('wapo-guides-meta') || '{}');
      meta['ff4-advance-bestiary'] = { pct: Math.round(done/total*100), checked: done, total };
      localStorage.setItem('wapo-guides-meta', JSON.stringify(meta));
    } catch(e){}
  }

  function applyDone(){
    boxes.forEach(b => { b.closest('.check-item').classList.toggle('done', b.checked); });
  }

  const stored = load();
  boxes.forEach(b => {
    if(stored[b.id]) b.checked = true;
    b.addEventListener('change', function(){
      this.closest('.check-item').classList.toggle('done', this.checked);
      save();
      updateProgress();
    });
    b.closest('.check-item').addEventListener('click', function(e){
      if(e.target === b || e.target.tagName === 'LABEL') return;
      b.checked = !b.checked;
      b.dispatchEvent(new Event('change'));
    });
  });

  applyDone();
  updateProgress();

  document.getElementById('toggle-done').addEventListener('click', function(){
    document.body.classList.toggle('hide-done');
    this.textContent = document.body.classList.contains('hide-done') ? 'Show Completed' : 'Hide Completed';
  });

  document.getElementById('reset-btn').addEventListener('click', function(){
    if(!confirm('Reset all checkboxes?')) return;
    boxes.forEach(b => { b.checked = false; });
    applyDone();
    save();
    updateProgress();
  });

  document.getElementById('savemenu-btn').addEventListener('click', function(e){
    e.stopPropagation();
    const menu = document.getElementById('savemenu');
    const rect = this.getBoundingClientRect();
    if(menu.style.display === 'block'){ menu.style.display = 'none'; }
    else { menu.style.display = 'block'; menu.style.top = (rect.bottom + 4) + 'px'; menu.style.left = rect.left + 'px'; }
  });

  document.addEventListener('click', function(){ document.getElementById('savemenu').style.display = 'none'; });

  document.getElementById('export-btn').addEventListener('click', function(){
    const data = { [STORE]: localStorage.getItem(STORE) || '{}' };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = STORE + '-backup.json';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  document.getElementById('import-btn').addEventListener('click', function(){
    document.getElementById('import-file').click();
  });

  document.getElementById('import-file').addEventListener('change', function(){
    const file = this.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
      try {
        const data = JSON.parse(e.target.result);
        if(data[STORE]) localStorage.setItem(STORE, data[STORE]);
        const stored = load();
        boxes.forEach(b => { b.checked = !!stored[b.id]; });
        applyDone();
        updateProgress();
        alert('Save imported successfully.');
      } catch(err) { alert('Invalid backup file.'); }
    };
    reader.readAsText(file);
    this.value = '';
  });

  window.addEventListener('scroll', function(){
    document.getElementById('scroll-top').style.opacity = window.scrollY > 300 ? '0.7' : '0';
  });
})();
</script>
